services:
  - type: web
    name: floraflow-api
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn floraflow.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health
    autoDeploy: true
    preDeployCommand: python -m floraflow.demo &
